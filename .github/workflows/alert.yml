name: OPM Status Watchdog
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v4 is still fine, but check for v5 soon

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5 to resolve Node 20 warning
        with:
          python-version: '3.11'   # Specifying a version helps stability

      - name: Install Dependencies
        run: pip install requests

      - name: Run Monitoring Script
        run: python check_status.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_alert.txt activity*.log
          git commit -m "Automated OPM Check [Skip CI]" || exit 0
          git push
