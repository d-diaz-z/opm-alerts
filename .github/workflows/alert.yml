name: OPM Status Watchdog
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  # Explicitly force GitHub to use the Node 24 runtime for all actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Note: v4 is updated to support node24 internally

      - name: Set up Python
        uses: actions/setup-python@v5 # v5 includes Node 24 compatibility fixes
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Monitoring Script
        run: python check_status.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add last_alert.txt activity.log
          git add logs/activity_*.log 2>/dev/null || true
          git commit -m "Automated OPM Check [Skip CI]" || exit 0
          git push
